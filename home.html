<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>F.A.B.R.I.C. | Home</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <style>
        /* Hero Section - Teal banner at top of the page, centered layout */
        .hero {
            background-color: #2c7a7b;
            color: white;
            text-align: center;
            padding: 56px 24px; /* 56px top/bottom 24px left/right spacing */
            border-radius: 8px;
            margin-bottom: 48px;
            margin-left: 0px;
            margin-right: 0px;
            transition: 1s ease-in-out;
        }

        .hero:hover {
            border-radius: 8px;
            transition: 2s ease-in-out;
            transform: scaleX(1.1) scaleY(1.1);
            margin-left: -500px;
            margin-right: -500px;
        }

        /* Main heading inside of hero */
        .hero h2 {
            color: white;
            font-size: 32px;
            margin-bottom: 12px;
        }

        /* Paragraph inside of hero */
        .hero p {
            width: 580px;
            margin: 0 auto 24px auto; /* centered horizontally with a 24px gap below */
            color: white;
            font-size: 16px;
            line-height: 27px; 
        }


    </style>
</html>
